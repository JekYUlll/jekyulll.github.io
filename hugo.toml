baseURL = "https://horeb.top/"
languageCode = "zh-cn"
title = "Horeb"
theme = "stack"
paginate = 10
enableEmoji = true
enableGitInfo = true

[author]
  name = "JekYUlll"

[services.googleAnalytics]
  id = 'G-Q6473FXND4'

[frontmatter]
  date = [':date', ':filename', ':default']
  lastmod = [':fileModTime', ':default']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# === Taxonomies ===
[taxonomies]
  tag = "tags"
  category = "categories"

# === Left Sidebar ===
[sidebar]
  compact = false
  emoji = "✏️"
  subtitle = "C++ / Go / Rust"

# === Article defaults ===
[article]
  headingAnchor = true
  math = false
  toc = true
  readingTime = true

[article.license]
  enabled = true
  default = "CC BY-NC 4.0"

# === Date format ===
[params.dateFormat]
  published = "2006-01-02"
  lastUpdated = "2006-01-02"

# === Site description & keywords ===
[params]
  description = "--C++, Go, Linux--"
  keywords = "homepage, blog, c++, golang, rust, linux"
  mainSections = ["posts"]
  homeSubtitle = "do not panic"
  rssFullContent = true

# === Color Scheme ===
[colorScheme]
  toggle = true
  default = "auto"

# === Footer ===
[footer]
  since = 2024
  customText = ""

# === Menu ===
[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

# === Related posts ===
[related]
  includeNewer = false
  threshold = 80
  toLower = false

  [[related.indices]]
    name = "keywords"
    weight = 100

  [[related.indices]]
    name = "tags"
    weight = 80
